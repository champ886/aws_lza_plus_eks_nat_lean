name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  validate-confirmation:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Input
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "destroy" ]; then
            echo "❌ Confirmation failed. You must type 'destroy' to proceed."
            exit 1
          fi
          echo "✅ Confirmation validated"

  # Destroy in reverse order
  destroy-dev-eks:
    needs: validate-confirmation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
      - name: Terraform Init
        working-directory: environments/dev/eks
        run: terraform init
      
      - name: Terraform Destroy
        working-directory: environments/dev/eks
        env:
          TF_VAR_dev_workload_account_id: ${{ secrets.DEV_WORKLOAD_ACCOUNT_ID }}
        run: terraform destroy -auto-approve

  destroy-peering:
    needs: destroy-dev-eks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
      - name: Terraform Init
        working-directory: environments/peering
        run: terraform init
      
      - name: Terraform Destroy
        working-directory: environments/peering
        env:
          TF_VAR_security_account_id: ${{ secrets.SECURITY_ACCOUNT_ID }}
          TF_VAR_dev_workload_account_id: ${{ secrets.DEV_WORKLOAD_ACCOUNT_ID }}
        run: terraform destroy -auto-approve

  destroy-dev-vpc:
    needs: destroy-peering
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
      - name: Terraform Init
        working-directory: environments/dev/vpc
        run: terraform init
      
      - name: Terraform Destroy
        working-directory: environments/dev/vpc
        env:
          TF_VAR_dev_workload_account_id: ${{ secrets.DEV_WORKLOAD_ACCOUNT_ID }}
        run: terraform destroy -auto-approve

  destroy-shared-vpc:
    needs: destroy-dev-vpc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-2
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      
      - name: Terraform Init
        working-directory: environments/shared/vpc
        run: terraform init
      
      - name: Terraform Destroy
        working-directory: environments/shared/vpc
        env:
          TF_VAR_security_account_id: ${{ secrets.SECURITY_ACCOUNT_ID }}
        run: terraform destroy -auto-approve